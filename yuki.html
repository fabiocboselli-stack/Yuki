<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a1628">
<title>Yuki ❄️</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;700&family=Exo+2:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --ice: #a8d8f0; --glow: #5bc8f5; --deep: #0a1628;
    --accent: #00fff7; --soft: #e0f4ff;
  }
  body {
    background: var(--deep); color: var(--soft);
    font-family: 'Exo 2', sans-serif;
    height: 100dvh; display: flex; flex-direction: column;
    overflow: hidden; position: relative;
  }
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,200,255,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0,100,200,0.06) 0%, transparent 60%),
      var(--deep);
  }
  .snow { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .flake { position:absolute; top:-10px; background:rgba(168,216,240,0.6); border-radius:50%; animation:fall linear infinite; }
  @keyframes fall { to { transform:translateY(110dvh) translateX(20px); opacity:0; } }

  .header {
    position:relative; z-index:10; flex-shrink:0;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px 10px;
    border-bottom:1px solid rgba(91,200,245,0.12);
  }
  .logo {
    font-family:'Orbitron',monospace; font-size:22px; font-weight:700;
    letter-spacing:4px; color:var(--glow);
    text-shadow:0 0 20px rgba(91,200,245,0.8),0 0 40px rgba(91,200,245,0.4);
  }
  .status { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--ice); font-family:'Orbitron',monospace; letter-spacing:1px; opacity:0.7; }
  .dot { width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

  .avatar-zone { position:relative; z-index:10; flex-shrink:0; display:flex; flex-direction:column; align-items:center; padding:18px 0 10px; }
  .holo-ring { position:relative; width:120px; height:120px; }
  .ring { position:absolute; border-radius:50%; border:1px solid transparent; animation:spin linear infinite; }
  .ring-1 { inset:0; border-color:rgba(91,200,245,0.5) transparent transparent transparent; animation-duration:4s; }
  .ring-2 { inset:8px; border-color:transparent rgba(0,255,247,0.4) transparent transparent; animation-duration:6s; animation-direction:reverse; }
  .ring-3 { inset:16px; border-color:rgba(168,216,240,0.3) transparent rgba(168,216,240,0.3) transparent; animation-duration:8s; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .avatar-core {
    position:absolute; inset:22px; border-radius:50%;
    background:radial-gradient(circle at 35% 35%, rgba(180,230,255,0.9) 0%, rgba(91,200,245,0.6) 30%, rgba(20,80,140,0.8) 65%, rgba(10,22,40,0.9) 100%);
    box-shadow:0 0 20px rgba(91,200,245,0.4),0 0 40px rgba(91,200,245,0.2);
    overflow:hidden; display:flex; align-items:center; justify-content:center;
  }
  .face { width:100%; height:100%; animation:holo-flicker 8s ease-in-out infinite; }
  @keyframes holo-flicker { 0%,94%,100%{opacity:1;filter:brightness(1)} 95%{opacity:0.7;filter:brightness(1.5)} 96%{opacity:1;filter:brightness(0.8)} }
  .scan-line { position:absolute; inset:22px; border-radius:50%; overflow:hidden; pointer-events:none; }
  .scan-line::after { content:''; position:absolute; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,rgba(0,255,247,0.4),transparent); animation:scan 3s linear infinite; }
  @keyframes scan { from{top:-2px} to{top:100%} }
  .yuki-name { margin-top:10px; font-family:'Orbitron',monospace; font-size:13px; letter-spacing:6px; color:var(--ice); text-shadow:0 0 12px rgba(91,200,245,0.6); opacity:0.85; }
  .yuki-mood { margin-top:3px; font-size:11px; color:rgba(168,216,240,0.45); letter-spacing:2px; font-style:italic; min-height:16px; }

  .chat { flex:1; overflow-y:auto; padding:12px 16px; display:flex; flex-direction:column; gap:10px; position:relative; z-index:10; scrollbar-width:thin; scrollbar-color:rgba(91,200,245,0.2) transparent; }
  .msg { max-width:82%; padding:10px 14px; border-radius:16px; font-size:14px; line-height:1.55; animation:appear 0.3s ease; }
  @keyframes appear { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg.yuki { align-self:flex-start; background:linear-gradient(135deg,rgba(13,32,64,0.95),rgba(20,50,90,0.85)); border:1px solid rgba(91,200,245,0.2); border-left:2px solid var(--glow); color:var(--soft); box-shadow:0 2px 16px rgba(0,0,0,0.3); }
  .msg.user { align-self:flex-end; background:linear-gradient(135deg,rgba(0,100,160,0.5),rgba(0,60,120,0.4)); border:1px solid rgba(91,200,245,0.15); color:var(--soft); }
  .msg-sender { font-size:10px; font-family:'Orbitron',monospace; letter-spacing:1px; margin-bottom:5px; opacity:0.6; }
  .msg.yuki .msg-sender { color:var(--glow); }
  .msg.user .msg-sender { color:rgba(168,216,240,0.5); }
  .typing { align-self:flex-start; display:flex; align-items:center; gap:5px; padding:12px 16px; background:rgba(13,32,64,0.8); border:1px solid rgba(91,200,245,0.15); border-radius:16px; border-left:2px solid var(--glow); }
  .typing span { width:5px; height:5px; background:var(--glow); border-radius:50%; animation:bounce 1.2s ease-in-out infinite; }
  .typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-5px);opacity:1} }
  .error-msg { align-self:center; font-size:12px; color:rgba(255,150,150,0.7); font-style:italic; padding:4px 10px; }

  .input-zone { position:relative; z-index:10; flex-shrink:0; padding:10px 16px 24px; border-top:1px solid rgba(91,200,245,0.1); display:flex; gap:10px; align-items:center; }
  .input-wrap { flex:1; display:flex; align-items:center; background:rgba(13,32,64,0.8); border:1px solid rgba(91,200,245,0.2); border-radius:24px; padding:0 16px; transition:border-color 0.2s; }
  .input-wrap:focus-within { border-color:rgba(91,200,245,0.5); box-shadow:0 0 12px rgba(91,200,245,0.1); }
  input[type=text] { flex:1; background:none; border:none; outline:none; color:var(--soft); font-family:'Exo 2',sans-serif; font-size:14px; padding:12px 0; }
  input::placeholder { color:rgba(168,216,240,0.3); }
  .btn-send, .btn-voice { width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0; }
  .btn-send { background:linear-gradient(135deg,rgba(91,200,245,0.8),rgba(0,150,200,0.8)); box-shadow:0 0 12px rgba(91,200,245,0.3); }
  .btn-send:active{transform:scale(0.92)} .btn-send:disabled{opacity:0.4;cursor:not-allowed}
  .btn-voice { background:rgba(13,32,64,0.8); border:1px solid rgba(91,200,245,0.2); color:var(--glow); }
  .btn-voice.recording { background:rgba(255,50,50,0.3); border-color:rgba(255,100,100,0.5); animation:rec-pulse 1s ease-in-out infinite; }
  @keyframes rec-pulse { 0%,100%{box-shadow:0 0 12px rgba(255,50,50,0.3)} 50%{box-shadow:0 0 22px rgba(255,50,50,0.7)} }
</style>
</head>
<body>
<div class="bg"></div>
<div class="snow" id="snow"></div>

<div class="header">
  <div class="logo">YUKI</div>
  <div class="status"><div class="dot"></div><span id="statusText">ONLINE</span></div>
</div>

<div class="avatar-zone">
  <div class="holo-ring">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="avatar-core">
      <svg class="face" viewBox="0 0 76 76" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="skin" cx="40%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#c8eeff" stop-opacity="0.95"/>
            <stop offset="50%" stop-color="#7ac8f0" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#1a5080" stop-opacity="0.6"/>
          </radialGradient>
          <radialGradient id="glowR" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#00fff7" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="#00fff7" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <ellipse cx="38" cy="40" rx="22" ry="26" fill="url(#glowR)"/>
        <ellipse cx="38" cy="40" rx="18" ry="22" fill="url(#skin)" opacity="0.9"/>
        <path d="M20 30 Q16 20 18 12 Q24 6 32 8 Q38 6 44 8 Q52 6 58 12 Q60 20 56 30" fill="none" stroke="rgba(200,235,255,0.7)" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M20 30 Q15 45 16 58 Q18 65 22 68" stroke="rgba(180,220,245,0.5)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M56 30 Q61 45 60 58 Q58 65 54 68" stroke="rgba(180,220,245,0.5)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <ellipse cx="30" cy="38" rx="4.5" ry="3" fill="rgba(5,15,35,0.9)"/>
        <circle cx="30" cy="38" r="1.8" fill="rgba(0,200,255,0.8)"/>
        <circle cx="31.2" cy="37" r="0.7" fill="rgba(255,255,255,0.9)"/>
        <line x1="26" y1="36" x2="25" y2="34.5" stroke="rgba(180,220,245,0.6)" stroke-width="0.6"/>
        <line x1="27.5" y1="35.2" x2="27" y2="33.5" stroke="rgba(180,220,245,0.6)" stroke-width="0.6"/>
        <line x1="29.5" y1="35" x2="29.5" y2="33.2" stroke="rgba(180,220,245,0.6)" stroke-width="0.6"/>
        <line x1="31.5" y1="35.2" x2="32" y2="33.5" stroke="rgba(180,220,245,0.6)" stroke-width="0.6"/>
        <ellipse cx="46" cy="38" rx="4.5" ry="3" fill="rgba(5,15,35,0.9)"/>
        <circle cx="46" cy="38" r="1.8" fill="rgba(0,200,255,0.8)"/>
        <circle cx="47.2" cy="37" r="0.7" fill="rgba(255,255,255,0.9)"/>
        <line x1="42" y1="36" x2="41" y2="34.5" stroke="rgba(180,220,245,0.6)" stroke-width="0.6"/>
        <line x1="43.5" y1="35.2" x2="43" y2="33.5" stroke="rgba(180,220,245,0.6)" stroke-width="0.6"/>
        <line x1="45.5" y1="35" x2="45.5" y2="33.2" stroke="rgba(180,220,245,0.6)" stroke-width="0.6"/>
        <line x1="47.5" y1="35.2" x2="48" y2="33.5" stroke="rgba(180,220,245,0.6)" stroke-width="0.6"/>
        <path d="M37 43 Q38 46 39 43" stroke="rgba(100,180,220,0.4)" stroke-width="0.8" fill="none"/>
        <path d="M33 50 Q38 54 43 50" stroke="rgba(140,200,235,0.7)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <path d="M34 22 L38 18 L42 22" stroke="rgba(0,255,247,0.4)" stroke-width="0.8" fill="none"/>
        <circle cx="38" cy="17" r="1" fill="rgba(0,255,247,0.5)"/>
        <ellipse cx="38" cy="40" rx="18" ry="22" fill="none" stroke="rgba(91,200,245,0.15)" stroke-width="1"/>
      </svg>
    </div>
    <div class="scan-line"></div>
  </div>
  <div class="yuki-name">Y U K I</div>
  <div class="yuki-mood" id="yukiMood">assistente pessoal · fábio</div>
</div>

<div class="chat" id="chat"></div>

<div class="input-zone">
  <button class="btn-voice" id="btnVoice" onclick="toggleVoice()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
    </svg>
  </button>
  <div class="input-wrap">
    <input type="text" id="msgInput" placeholder="Fale com Yuki..." onkeydown="if(event.key==='Enter')sendMsg()"/>
  </div>
  <button class="btn-send" id="btnSend" onclick="sendMsg()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
      <line x1="22" y1="2" x2="11" y2="13"/>
      <polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<script>
  const API_KEY = 'AIzaSyBErEoVsd-2VmCI5i-DUoq32tqPxEDu9Xg';
  const GEMINI  = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;

  const SYSTEM = `Você é Yuki, a assistente pessoal exclusiva do Fábio.
Personalidade: feminina, elegante, próxima e discreta. Como uma amiga inteligente.
Fala português brasileiro de forma natural e calorosa, sem ser formal demais.
Tem senso de humor sutil. Usa ❄️ ou 🌙 esporadicamente.
Regras: sempre chame o usuário de "Fábio". Respostas concisas — tela de celular.
Nunca quebre o personagem. App no Samsung Galaxy S21.
Hoje: ${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}.`;

  let history = [];
  let isThinking = false;

  // Snow
  const snowEl = document.getElementById('snow');
  for(let i=0;i<25;i++){
    const f=document.createElement('div');
    f.className='flake';
    f.style.cssText=`left:${Math.random()*100}vw;animation-duration:${7+Math.random()*10}s;animation-delay:${-Math.random()*14}s;opacity:${0.15+Math.random()*0.4};width:${1.5+Math.random()*2}px;height:${1.5+Math.random()*2}px`;
    snowEl.appendChild(f);
  }

  const chat = document.getElementById('chat');

  function addMsg(text, who) {
    const d = document.createElement('div');
    d.className = 'msg ' + who;
    d.innerHTML = `<div class="msg-sender">${who==='yuki'?'YUKI':'VOCÊ'}</div>${text}`;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const t = document.createElement('div');
    t.className='typing'; t.id='typing';
    t.innerHTML='<span></span><span></span><span></span>';
    chat.appendChild(t);
    chat.scrollTop = chat.scrollHeight;
  }

  function hideTyping() { const t=document.getElementById('typing'); if(t) t.remove(); }
  function setMood(text) { document.getElementById('yukiMood').textContent=text; }
  function setStatus(text) { document.getElementById('statusText').textContent=text; }

  async function askYuki(userText) {
    history.push({role:'user', parts:[{text:userText}]});
    const res = await fetch(GEMINI, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        system_instruction:{parts:[{text:SYSTEM}]},
        contents: history,
        generationConfig:{temperature:0.88, maxOutputTokens:300}
      })
    });
    if(!res.ok) { const e=await res.json(); throw new Error(e?.error?.message||'Erro API'); }
    const data = await res.json();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '...';
    history.push({role:'model', parts:[{text:reply}]});
    return reply;
  }

  async function sendMsg() {
    if(isThinking) return;
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if(!text) return;
    input.value='';
    addMsg(text,'user');
    isThinking=true;
    document.getElementById('btnSend').disabled=true;
    setStatus('PENSANDO'); setMood('processando...');
    showTyping();
    try {
      const reply = await askYuki(text);
      hideTyping();
      addMsg(reply,'yuki');
      speak(reply);
      setMood('assistente pessoal · fábio');
    } catch(e) {
      hideTyping();
      const err=document.createElement('div');
      err.className='error-msg';
      err.textContent='⚠️ Não consegui me conectar. Tente novamente.';
      chat.appendChild(err);
      setMood('erro de conexão');
      console.error(e);
    }
    setStatus('ONLINE');
    document.getElementById('btnSend').disabled=false;
    isThinking=false;
  }

  function speak(text) {
    if(!window.speechSynthesis) return;
    const clean=text.replace(/[❄️🌙✨💫]/g,'');
    const utt=new SpeechSynthesisUtterance(clean);
    utt.lang='pt-BR'; utt.rate=0.92; utt.pitch=1.15;
    const voices=speechSynthesis.getVoices();
    const ptFem=voices.find(v=>v.lang.startsWith('pt')&&/female|woman|feminina/i.test(v.name));
    const ptAny=voices.find(v=>v.lang.startsWith('pt'));
    if(ptFem) utt.voice=ptFem; else if(ptAny) utt.voice=ptAny;
    speechSynthesis.cancel();
    speechSynthesis.speak(utt);
  }

  let recognition=null, recording=false;
  function toggleVoice() {
    if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
      alert('Use o Chrome no Android para falar com a Yuki.'); return;
    }
    if(recording){ recognition?.stop(); return; }
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    recognition=new SR();
    recognition.lang='pt-BR'; recognition.interimResults=false;
    recognition.onstart=()=>{ recording=true; document.getElementById('btnVoice').classList.add('recording'); setMood('ouvindo...'); };
    recognition.onresult=(e)=>{ document.getElementById('msgInput').value=e.results[0][0].transcript; sendMsg(); };
    recognition.onend=()=>{ recording=false; document.getElementById('btnVoice').classList.remove('recording'); setMood('assistente pessoal · fábio'); };
    recognition.onerror=()=>{ recording=false; document.getElementById('btnVoice').classList.remove('recording'); setMood('assistente pessoal · fábio'); };
    recognition.start();
  }

  window.addEventListener('load',()=>{
    speechSynthesis.getVoices();
    speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
    const h=new Date().getHours();
    const greeting = h>=5&&h<12 ? 'Bom dia, Fábio. Pronto para começar o dia? ❄️'
                   : h>=12&&h<18 ? 'Boa tarde, Fábio. Como posso te ajudar? 🌙'
                   : 'Boa noite, Fábio. Estou aqui quando precisar. 🌙';
    setTimeout(()=>{ addMsg(greeting,'yuki'); speak(greeting); }, 700);
  });
</script>
</body>
</html>
